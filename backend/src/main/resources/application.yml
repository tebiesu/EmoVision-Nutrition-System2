server:
  port: 8080

spring:
  application:
    name: health-assistant-backend
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-secret-key-for-jwt-token}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
  upload:
    max-size-bytes: ${UPLOAD_MAX_SIZE_BYTES:5242880}
    allowed-types: image/jpeg,image/png,image/webp
    base-dir: ${UPLOAD_BASE_DIR:uploads}
